<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
        body {
            text-align: center;
        }
        ul, li {
            list-style-type: none;
        }
    </style>
</head>
<body>
    <div id="business-list">
        <div class="header">
            <h1>{{ header }}</h1>
            <button v-if="editing" @click="doEdit(false)">Отменить</button>
            <button v-else @click="doEdit(true)">Добавить дело</button>
        </div>
        
        <div v-if="editing" class="edit">
            <input 
                @keyup.enter="saveItem" 
                v-model="newItem" 
                type="text" 
                placeholder="Добавьте новое дело"
            >
            <p>{{charCounter}}/200</p>
            <button
                @click="saveItem"
                :disabled="newItem.length === 0"
            >
                Сохранить дело
            </button>
        </div>
        <ul>
            <li 
                v-for="item in items" 
                :key="item.id"
            >{{item.label}}</li>
        </ul>
    </div>
    <script>
        const businessList = Vue.createApp({
            data() {
                return {
                    header: 'Список дел',
                    newItem: '',
                    editing: false,
                    items: []
                }
            },
            computed: {
                charCounter() {
                    return this.newItem.length
                }
            },
            methods: {
                saveItem() {
                    this.items.push({id: this.items.length + 1, label: this.newItem})
                    this.newItem = ""
                },
                doEdit(editing) {
                    this.editing = editing
                    this.newItem = ""
                },
            }
        }).mount('#business-list')
    </script>
</body>
</html>
